name: Feature request
description: Suggest something Nulltrack should do
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        Please search [existing requests](https://github.com/nulltrack/issues-feedback/issues?q=is%3Aissue+label%3Afeature-request)
        first — if your idea is already there, add a 👍 to it.
  - type: textarea
    id: feature
    attributes:
      label: What would you like Nulltrack to do?
      placeholder: Describe the feature.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: What would you use it for?
      description: The musical problem it solves helps more than the feature description itself.
      placeholder: When I'm making ... I want to ... but currently I have to ...
    validations:
      required: false
